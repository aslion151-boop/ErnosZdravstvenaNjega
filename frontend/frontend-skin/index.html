  <script id="ernos-crumbs-early">
/* Early shim so route() can set the header title even before the full helper loads */
(function(){
  window.setCrumbs = window.setCrumbs || function setCrumbs(txt){
    try{
      txt = String(txt || '').trim();
      document.body.setAttribute('data-crumbs', txt);
      const hdr = document.querySelector('header.skin-header');
      if (!hdr) return; // header not in DOM yet; full helper will correct later
      let span = hdr.querySelector('#crumbs');
      if (!span) {
        span = document.createElement('span');
        span.id = 'crumbs';
        hdr.insertBefore(span, hdr.firstChild || null);
      }
      span.textContent = txt || '';
    }catch(_){}
  };
})();
</script>

  <script>
    /* ===== ONE-TIME HARD RESET: kill old SW + caches, then reload once ===== */
    (function () {
      if (localStorage.getItem('ernos_hardfix_done')) return;   // run once
      try {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(list => {
            Promise.all(list.map(r => r.unregister())).then(() => {
              if (window.caches && caches.keys) {
                caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
                  localStorage.setItem('ernos_hardfix_done', '1');
                  location.reload();
                });
              } else {
                localStorage.setItem('ernos_hardfix_done', '1');
                location.reload();
              }
            });
          });
        }
      } catch (e) {
        localStorage.setItem('ernos_hardfix_done', '1');
      }
    })();
    </script>

      --sidebar-gray:#4E6E81; --sidebar-gray-darker:#3E5967; --sidebar-link:#EAF1F4; --sidebar-link-muted:#D7E3E8;

  <style id="ernos-refresh-button">
  /* Refresh buttons use the header/sidebar tone */
  .btn.refresh{
    background: var(--sidebar-gray);
    border-color: var(--sidebar-gray);
    color: #fff;
  }
  .btn.refresh:hover{ filter: brightness(1.05); }
  .btn.refresh:active{ filter: brightness(0.97); }

  /* If you ever want an outline version, keep this too */
  .btn.ghost.refresh{
    background: transparent;
    border: 1px solid var(--sidebar-gray);
    color: var(--sidebar-gray);
  }
</style>

<style id="ernos-button-theme">
  /* Base primary button = same green as other green UI (var(--accent)) */
  .btn{
    background: var(--accent);
    border: 0;
    color: #fff;
    font-weight: 700;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    text-decoration: none;
    transition: filter .12s ease, opacity .12s ease, box-shadow .12s ease;
  }
  .btn:hover{ filter: brightness(1.05); }
  .btn:active{ filter: brightness(0.97); }
  .btn[disabled]{ opacity: .6; cursor: default; filter: none; }

  /* Secondary/ghost = green outline */
  .btn.ghost{
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
  }
  .btn.ghost:hover{ box-shadow: inset 0 0 0 999px rgba(0,0,0,.03); }

  /* Small size */
  .btn.small{ padding: 6px 10px; font-weight: 600; }

  /* Destructive buttons (Delete/Resolve) — clean red */
  .btn.destructive{
    background: var(--err);
    border-color: var(--err);
    color: #fff;
  }
  .btn.ghost.destructive{
    background: transparent;
    border-color: var(--err);
    color: var(--err);
  }
  .btn.destructive:hover{ filter: brightness(1.05); }
  .btn.destructive:active{ filter: brightness(0.97); }

  /* Optional warning style, if you need one later */
  .btn.warning{ background: var(--warn); border-color: var(--warn); color:#fff; }
  .btn.ghost.warning{ background: transparent; border-color: var(--warn); color: var(--warn); }
</style>

    /* Alerts & tags */
    .alert{ padding:10px 12px; border:1px solid var(--border); background:#fff; color:var(--text); border-radius:10px }
    .alert.ok{ background:#E9F5EF; border-color:#CFE8DB; color:#1D5C45 }

    .card{ background:#fff; border:1px solid var(--border); border-radius:16px; box-shadow:var(--shadow); padding:16px; margin-bottom:16px }

.table-wrap{ overflow:auto; -webkit-overflow-scrolling:touch; max-width:100%; }

    .title, h2{ font-size:18px; margin:0 0 6px 0 }

    .empty{ border:1px dashed var(--border); border-radius:14px; padding:16px; text-align:center; color:var(--muted); background:#fff }

    /* Sidebar palette */

    .sidebar .brand{ color: var(--sidebar-link-muted) }

    :root{ --header-h: 56px; }
@media (min-width:900px){ :root{ --header-h: 64px; } }

/* Sticky header + crumbs (safe-area aware) */

  position: sticky;
  top: 0;
  z-index: 1200;
  display: flex; align-items: center; gap: 12px;
  padding: calc(6px + env(safe-area-inset-top, 0)) 14px 10px 14px;

}

header.skin-header img{ height: calc(var(--header-h) - 8px); display:block; }

    header.skin-header .header-crumbs{ margin-left: 8px; flex: 1; font-weight: 700; color: #EAF1F4; }
    #menuBtn{ display: inline-flex; }

    /* Remove seam; hide old topbar */

    .topbar{ display: none !important; }

      background: transparent;
      border: 1px solid rgba(255,255,255,.35);

    }

    .table th.t-dt,  .table td.t-dt { white-space: nowrap; }

img.thumb {
  display: block;

<style id="ernos-final-no-gap">

  /* MOBILE ONLY: fixed header & sidebar below it */
  @media (max-width: 900px){
    header.skin-header{
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: 0 !important;
      z-index: 1200 !important;
      pointer-events: auto !important;
    }
    /* Offset only the scrolling area on mobile */
    .main{ padding-top: var(--header-h, 56px) !important; }
    body, main, #app-main, .app-main, .page, #root, #container, #view{
      padding-top: 0 !important;
      margin-top: 0 !important;
    }
    #view > :first-child{ margin-top: 0 !important; }

    /* Sidebar opens under the header on mobile */
    .sidebar{
      position: fixed !important;
      left: 0 !important; right: auto !important;
      top: var(--header-h, 56px) !important;
      height: calc(100dvh - var(--header-h, 56px)) !important;
      transform: translateX(-100%) !important;
      z-index: 1100 !important; /* below header */
      overscroll-behavior: contain !important;
      -webkit-overflow-scrolling: touch !important;
      overflow-y: auto !important;
    }
    .sidebar.open{ transform: none !important; }
  }

  /* DESKTOP: header sits next to the sidebar; sidebar is full-height from the top */
  @media (min-width: 901px){
    /* Sidebar: from very top, full viewport height */
    .sidebar{
      position: fixed !important;
      top: 0 !important; left: 0 !important; right: auto !important; bottom: 0 !important;
      height: 100dvh !important;
      transform: none !important;
      z-index: 1000 !important;
      overflow-y: auto !important;
    }
    /* Main content already has margin-left:270px in your CSS;
       keep header non-fixed so it "leans" on the sidebar and does not overlap it */
    header.skin-header{
      position: sticky !important;
      top: 0 !important;
      left: auto !important; right: auto !important;
      z-index: 900 !important;
    }
    /* No artificial content padding on desktop */
    .main{ padding-top: 0 !important; }
    #view{ padding-top: 0 !important; }
    #view > :first-child{ margin-top: 0 !important; }
  }
</style>
<style id="ernos-list-polish">
  /* Container gets rounded corners + soft border */
  .table-wrap.pretty{
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;               /* rounds the header too */
    background: #fff;
    box-shadow: var(--shadow);
  }

  /* Gorgeous tables */
  table.table.pretty{
    width:100%;
    border-collapse: separate;
    border-spacing:0;
    font-size: 14px;
  }
  @media (min-width:900px){ table.table.pretty{ font-size: 16px } }

  /* Sticky header (stays visible on scroll) */
  .table.pretty thead th{
    position: sticky; top: 0; z-index: 1;
    background: linear-gradient(180deg, #fafbfc, #f3f5f8);
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    letter-spacing: .06em;
    font-weight: 800; color: var(--muted);
    padding: 10px 12px;
  }

  /* Zebra + hover */
  .table.pretty tbody tr:nth-child(odd){ background: #fff; }
  .table.pretty tbody tr:nth-child(even){ background: #fafcff; }
  .table.pretty tbody tr:hover{ background: #eef6f3; } /* subtle greenish hover */

  .table.pretty td{
    padding: 12px;
    vertical-align: middle;
  }
  .table.pretty td.t-num{ text-align:right; font-variant-numeric: tabular-nums; }
  .table.pretty td.t-dt{ white-space:nowrap; }
  .table.pretty td .truncate{
    max-width: 38ch; display:inline-block; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    vertical-align: bottom;
  }
  @media (max-width: 860px){
    .table.pretty td .truncate{ max-width: 22ch; }
  }

  /* Badges: use the same green as your buttons for primary */
  .badge{ display:inline-block; padding:4px 10px; border-radius:999px; font-size:12px; }
  .badge--primary{ background: var(--accent); color: #fff; }
  .badge--ok{ background:#E9F5EF; color:#1D5C45; border:1px solid #CFE8DB; }
  .badge--warn{ background:#FFF5E6; color:#7A5A05; border:1px solid #F3E0BD; }
  .badge--err{ background:#FDEEEE; color:#7A2A2A; border:1px solid #F1C9C9; }

  /* Status color mapping */
  .status-badge[data-status="OPEN"]         { background:#FFF5E6; color:#7A5A05; border:1px solid #F3E0BD; }
  .status-badge[data-status="IN_PROGRESS"]  { background:#E9F5EF; color:#1D5C45; border:1px solid #CFE8DB; }
  .status-badge[data-status="RESOLVED"]     { background:var(--accent); color:#fff; border:1px solid transparent; }

  /* Nursing checks: status colours */
  .status-badge[data-status="OK"] {
    background:#E9F5EF;
    color:#1D5C45;
    border:1px solid #CFE8DB;
  }
  .status-badge[data-status="DUE_SOON"] {
    background:#FFF5E6;
    color:#7A5A05;
    border:1px solid #F3E0BD;
  }
  .status-badge[data-status="OVERDUE"],
  .status-badge[data-status="NEVER"] {
    background:#FDEEEE;
    color:#7A2A2A;
    border:1px solid #F1C9C9;
  }

  /* Tint the whole row slightly */
  tr[data-status="OK"] {
    background:#F6FBF8;
  }
  tr[data-status="DUE_SOON"] {
    background:#FFF9EE;
  }
  tr[data-status="OVERDUE"],
  tr[data-status="NEVER"] {
    background:#FEF3F3;
  }

  

  /* Category chip */
  .chip{ display:inline-flex; align-items:center; padding:3px 8px; border-radius:999px; font-size:12px; border:1px solid var(--border); color:var(--muted); background:#fff; }
  .chip[data-cat="MAINTENANCE"]{ background:#f2fbf6; color:#1D5C45; border-color:#CFE8DB; }
  .chip[data-cat="HOUSEKEEPING"]{ background:#fdf7f2; color:#7A5A05; border-color:#F3E0BD; }
  .chip[data-cat="NURSING"]{ background:#eef6ff; color:#184a90; border-color:#cfe0ff; }
  .chip[data-cat="RECEPTION"]{ background:#f2f2ff; color:#3a3696; border-color:#dcdcf9; }

  /* Nicer empty state in cards */
  .card .empty{
    border:1px dashed var(--border); border-radius:12px; color:var(--muted);
    background:#fff; padding:18px; text-align:center;
  }
</style>

<script id="ernos-crumbs-fix">
(function () {
  // --- helpers ---
  function ensureHeaderSlots() {
    const hdr = document.querySelector("header.skin-header, header, .skin-header");
    if (!hdr) return;

    // Left title
    let crumbs = hdr.querySelector("#crumbs");
    if (!crumbs) {
      crumbs = document.createElement("span");
      crumbs.id = "crumbs";
      hdr.insertBefore(crumbs, hdr.firstChild || null);
    }

    // Right badge
    let badge = hdr.querySelector("#userBadge");
    if (!badge) {
      badge = document.createElement("div");
      badge.id = "userBadge";
      hdr.appendChild(badge);
    }
  }

  function esc(text) {
    try {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    } catch (_) {
      return "";
    }
  }

  function userLabelFrom(me){
  const candidates = [
    me && me.display_name,           // our preferred label if present
    me && me.name,
    me && me.username,
    me && me.login_ident,
    me && me.email,
  ];
  const first = candidates.find(v => v && String(v).trim());
  return String(first || 'User').trim();
}

function roleLabelFrom(me){
  const candidates = [
    me && me.category,               // Reception / Nursing / Manager, etc.
    me && me.role,                   // Admin / User etc.
  ];
  let first = candidates.find(v => v && String(v).trim());
  if (!first) first = 'User';

  let label = String(first).trim();
  if (!label) label = 'User';

  // "MANAGER" -> "Manager", "NURSING" -> "Nursing"
  return label.charAt(0).toUpperCase() + label.slice(1).toLowerCase();
}



  function renderMeBadge(me) {
    try {
      ensureHeaderSlots();
      const hdr = document.querySelector("header.skin-header, header, .skin-header");
      if (!hdr) return;

      const route = (document.body.getAttribute("data-route") || "").toLowerCase();
      let badge = hdr.querySelector("#userBadge");

      // On the login page: never show a user badge
      if (route === "login") {
        if (badge) badge.innerHTML = "";
        return;
      }

      if (!badge) {
        badge = document.createElement("div");
        badge.id = "userBadge";
        hdr.appendChild(badge);
      }

      const name = userLabelFrom(me);
      const role = roleLabelFrom(me);
      const site = siteLabelFrom(me);

      // Format: Name, ROLE, Site name
      const parts = [esc(name), esc(role), esc(site)];
      badge.innerHTML = parts.join(", ");
    } catch (_) {}
  }

  let fetchedOnce = false;

  async function fetchMeAndRender() {
    if (fetchedOnce) return;
    fetchedOnce = true;

    try {
      ensureHeaderSlots();

      // Base API: ERNOS_API / ERNOS_PUBLIC_API_URL / origin
      var base =
        (window.ERNOS_API || window.ERNOS_PUBLIC_API_URL || window.location.origin || "").replace(
          /\/+$/,""
        );

      // Try to pick up any token the app might have stored
      var token =
        (window.state && window.state.token) ||
        localStorage.getItem("ernosToken") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        "";

      var headers = { Accept: "application/json" };
      if (token) headers["Authorization"] = "Bearer " + token;

      const paths = ["/me", "/api/me"];

      for (var i = 0; i < paths.length; i++) {
        try {
          const res = await fetch(base + paths[i], {
            method: "GET",
            headers,
            credentials: "include",
          });
          if (!res.ok) continue;
          const me = await res.json();
          if (me && typeof me === "object") {
            renderMeBadge(me);
            return;
          }
        } catch (e) {
          // try next path
        }
      }
    } catch (_) {}
  }

  // --- public API used by the SPA ---
  window.setCrumbs = function setCrumbs(txt) {
    try {
      txt = String(txt || "").trim();
      document.body.setAttribute("data-crumbs", txt);
      ensureHeaderSlots();
      const span = document.querySelector("header.skin-header #crumbs");
      if (span) span.textContent = txt || "";
    } catch (_) {}
  };

  // Public API used by the SPA to keep the header badge in sync
  window.renderUserBadge = function renderUserBadge() {
    try {
      ensureHeaderSlots();

      const hdr   = document.querySelector("header.skin-header, header, .skin-header");
      if (!hdr) return;

      const route = (document.body.getAttribute("data-route") || "").toLowerCase();
      const badge = hdr.querySelector("#userBadge");

      // Try to pick up whatever token the app is using right now
      var token =
        (window.state && window.state.token) ||
        localStorage.getItem("ernosToken") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        "";

      // ⛔ On the login page, or when there is no token at all:
      //    clear the badge and stop, so we never show stale user info.
      if (route === "login" || !token) {
        if (badge) badge.innerHTML = "";
        return;
      }

      // If the SPA already knows the current user, render from state.me
      if (window.state && window.state.me) {
        renderMeBadge(window.state.me);
        return;
      }

      // Otherwise, try to fetch /me once (fetchMeAndRender has its own guard)
      fetchMeAndRender();
    } catch (_) {
      // Best-effort fallback: if something blows up on login, make sure badge is blank
      try {
        const hdr = document.querySelector("header.skin-header, header, .skin-header");
        const badge = hdr && hdr.querySelector("#userBadge");
        const route = (document.body.getAttribute("data-route") || "").toLowerCase();
        if (route === "login" && badge) badge.innerHTML = "";
      } catch (e) {}
    }
  };

  // Run on load in case the bundle never calls renderUserBadge()
  function bootHeaderBadge() {
    try {
      const route = (document.body.getAttribute("data-route") || "").toLowerCase();

      var token =
        (window.state && window.state.token) ||
        localStorage.getItem("ernosToken") ||
        localStorage.getItem("token") ||
        localStorage.getItem("authToken") ||
        "";

      // If we're on the login page or there is no token, don't call /me at all.
      // Just make sure the badge (if present) is empty.
      if (route === "login" || !token) {
        try {
          ensureHeaderSlots();
          const hdr   = document.querySelector("header.skin-header, header, .skin-header");
          const badge = hdr && hdr.querySelector("#userBadge");
          if (badge) badge.innerHTML = "";
        } catch (_) {}
        return;
      }

      ensureHeaderSlots();
      fetchMeAndRender();
    } catch (_) {}
  }

  document.addEventListener("DOMContentLoaded", bootHeaderBadge);
  window.addEventListener("load", bootHeaderBadge);

})();
</script>

<script id="ernos-me-badge-hook">
(function () {
  // small escaper so we don't rely on bundle internals
  function esc(text) {
    try {
      return String(text || '')
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    } catch (_) {
      return "";
    }
  }

  function userLabelFrom(me){
    const candidates = [
      me && me.display_name,           // preferred label
      me && me.name,
      me && me.username,
      me && me.login_ident,
      me && me.email,
    ];
    const first = candidates.find(v => v && String(v).trim());
    return String(first || 'User').trim();
  }

  function roleLabelFrom(me){
    const candidates = [
      me && me.category,               // Reception / Nursing / Manager, etc.
      me && me.role,                   // Admin / User etc.
    ];
    let first = candidates.find(v => v && String(v).trim());
    if (!first) first = 'User';

    let label = String(first).trim();
    if (!label) label = 'User';

    // "MANAGER" -> "Manager", "NURSING" -> "Nursing"
    return label.charAt(0).toUpperCase() + label.slice(1).toLowerCase();
  }

  function siteLabelFrom(me){
    const candidates = [
      me && me.tenant_name,    // preferred explicit tenant name
      me && me.site,
      me && me.facility_name,
      me && me.facility,
    ];
    let first = candidates.find(v => v && String(v).trim());
    // No more "Site #1" fallback – default directly to Mount Sackville
    if (!first) first = 'Mount Sackville Nursing Home';
    return String(first).trim();
  }

  // Detect "weak" generic user objects (user / USER, no category etc.)
  function isWeakMe(me){
    if (!me || typeof me !== 'object') return true;

    const rawName =
      (me.display_name || me.name || me.username || me.login_ident || me.email || '');
    const nm = String(rawName || '').trim().toLowerCase();
    const cat = String(me.category || '').trim();
    const role = String(me.role || '').trim().toLowerCase();

    const nameLooksGeneric = !nm || nm === 'user' || nm === 'admin';
    const roleLooksGeneric = !role || role === 'user';
    const noCategory = !cat;

    return nameLooksGeneric && roleLooksGeneric && noCategory;
  }

  // Remember the best user we've seen so far this session
  window.__ernosLastUser = window.__ernosLastUser || null;

  function applyMeToHeader(me) {
    try {
      // If new "me" is weak and we already have a strong one, keep the strong one.
      if (isWeakMe(me) && window.__ernosLastUser && !isWeakMe(window.__ernosLastUser)) {
        me = window.__ernosLastUser;
      } else if (me && typeof me === 'object' && !isWeakMe(me)) {
        // Update stored user when we see a stronger one (Debby etc.)
        window.__ernosLastUser = me;
        try {
          localStorage.setItem('ernosLastUser', JSON.stringify(me));
        } catch(_) {}
      }

      const hdr = document.querySelector("header.skin-header, header, .skin-header");
      if (!hdr) return;

      const route = (document.body.getAttribute("data-route") || "").toLowerCase();
      let badge = hdr.querySelector("#userBadge");

      // On the login page: never show a user badge
      if (route === "login") {
        if (badge) badge.innerHTML = "";
        return;
      }

      if (!badge) {
        badge = document.createElement("div");
        badge.id = "userBadge";
        hdr.appendChild(badge);
      }

      const name = userLabelFrom(me || {});
      const role = roleLabelFrom(me || {});
      const site = siteLabelFrom(me || {});

      // Format: Name, ROLE, Site name
      const parts = [esc(name), esc(role), esc(site)];
      badge.innerHTML = parts.join(", ");
    } catch (_) {}
  }

  // If fetch doesn't exist, we can't hook anything
  if (!window.fetch) return;

  const origFetch = window.fetch;

  window.fetch = function (input, init) {
    const p = origFetch(input, init);

    try {
      const url =
        typeof input === "string"
          ? input
          : (input && (input.url || input.href)) || "";

      const isMe    = url && url.indexOf("/me") !== -1;
      const isLogin = url && url.indexOf("/auth/login") !== -1;

      if (isMe || isLogin) {
        p.then(function (res) {
          try {
            if (!res || !res.ok) return;
            res.clone().json().then(function (body) {
              let me = null;
              if (isLogin) {
                // login usually returns { token, user }
                if (body && typeof body === 'object') {
                  me = body.user || body.me || body;
                }
              } else if (isMe) {
                me = body;
              }
              if (me && typeof me === "object") {
                applyMeToHeader(me);
              }
            }).catch(function(){});
          } catch (_) {}
        }).catch(function () {});
      }
    } catch (_) {}

    return p;
  };

  // In case /me finished before our hook, try once after load using state.me or stored last user
  function tryFromState() {
    try {
      let me = null;
      if (window.state && window.state.me) {
        me = window.state.me;
      } else {
        try {
          const raw = localStorage.getItem('ernosLastUser');
          if (raw) me = JSON.parse(raw);
        } catch(_){}
      }
      if (me && typeof me === "object") {
        applyMeToHeader(me);
      }
    } catch (_) {}
  }

  document.addEventListener("DOMContentLoaded", tryFromState);
  window.addEventListener("load", tryFromState);
})();
</script>

<script id="ernos-history-guard">
(function () {
  // one-time root marker so we can still protect "exit"
  if (!history.state || history.state._ernos !== 'root') {
    history.replaceState({ _ernos: 'root' }, '');
  }

  let backArm = false;
  const ROOTS = new Set(['#login','#dashboard']);

  window.addEventListener('popstate', function () {
    const h = (location.hash || '').toLowerCase();

    // ✅ If we're navigating between app routes (e.g., from #visitors back to #dashboard),
    // do NOTHING here — let the browser go back naturally and let the router handle it.
    if (h && !ROOTS.has(h)) {
      // Make sure the router runs for the new hash
      try { window.dispatchEvent(new HashChangeEvent('hashchange')); } catch {}
      return;
    }

    // We are at a root screen (#login or #dashboard)
    // First back: arm the exit guard and immediately create a no-op state to stay in-app
    if (!backArm) {
      backArm = true;
      try { clearTimeout(window.__ernosBackTO); } catch (_){}
      window.__ernosBackTO = setTimeout(() => { backArm = false; }, 1500);

      // push a dummy state so the *next* back actually exits the tab/app
      history.pushState({ _ernos: 'guard' }, '');
      // (no "press back again" toast per your preference)
      return;
    }

    // Second back within 1.5s → allow exit by stepping past our guard+root
    history.go(-2);
  });
})();
</script>

<!-- Resident #report → /tap/resident redirect helper -->
<script>
  (function () {
    try {
      var hash = window.location.hash || "";
      if (!hash || hash.indexOf("#report") !== 0) return;

      var qIndex = hash.indexOf("?");
      if (qIndex === -1) return;

      var qs = hash.slice(qIndex + 1);
      var params = new URLSearchParams(qs);
      var token = (params.get("token") || "").trim();
      if (!token) return;

      var api = window.location.origin.replace(/\/+$/, "");
      fetch(api + "/tap/resolve/" + encodeURIComponent(token))
        .then(function (r) {
          if (!r.ok) throw new Error("HTTP " + r.status);
          return r.json();
        })
        .then(function (j) {
          if (!j || !j.ok) return;
          var type = String(j.type || "").toUpperCase();
          var kind = String(j.kind || "").toUpperCase();

          if (type === "RECEPTION_RESIDENTS" || kind === "RESIDENT") {
            var url = api + "/tap/resident/" + encodeURIComponent(j.token);
            window.location.replace(url);
          }
        })
        .catch(function (e) {
          console.warn("[tap redirect helper] error", e);
        });
    } catch (e) {
      console.warn("[tap redirect helper] top-level error", e);
    }
  })();
</script>

<script id="ernos-print-visitor-badge">
  (function(){
    function openBadgeWindow(name){
      try{
        var raw = (name || '').toString().trim();
        if (!raw) raw = 'Visitor';

        // Basic escaping
        var safe = raw.replace(/[&<>]/g, function(c){
          return c === '&' ? '&amp;'
               : c === '<' ? '&lt;'
               : c === '>' ? '&gt;'
               : c;
        });

        var w = window.open('', '_blank', 'width=600,height=400');
        if (!w) {
          alert('Pop-up blocked. Please allow pop-ups to print the badge.');
          return;
        }

        var html =
          '<!doctype html>' +
          '<html><head>' +
          '<meta charset="utf-8">' +
          '<title>Visitor Badge</title>' +
          '<style>' +
          ':root{' +
          '  --bg:#4E6E81; --panel:#FFFFFF; --accent:#7BA297; --border:#3E5967; --text:#1F2933;' +
          '}' +
          'body{' +
          '  margin:0; padding:24px; background:var(--bg);' +
          '  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;' +
          '  display:flex; justify-content:center; align-items:center;' +
          '  height:100vh; box-sizing:border-box;' +
          '}' +
          '.badge{' +
          '  background:var(--panel); border:2px solid var(--border); border-radius:18px;' +
          '  padding:24px 32px; min-width:260px; text-align:center;' +
          '  box-shadow:0 8px 24px rgba(15,23,42,0.18);' +
          '}' +
          '.badge-label{' +
          '  font-size:20px; letter-spacing:0.18em; text-transform:uppercase;' +
          '  font-weight:700; color:#fff; background:var(--accent);' +
          '  padding:6px 10px; border-radius:999px; display:inline-block; margin-bottom:18px;' +
          '}' +
          '.badge-name{' +
          '  font-size:32px; font-weight:700; color:var(--text); margin-bottom:4px;' +
          '  word-break:break-word;' +
          '}' +
          '.badge-sub{' +
          '  font-size:13px; color:#6B7280;' +
          '}' +
          '@media print{' +
          '  body{ background:#fff; height:auto; }' +
          '  .badge{ box-shadow:none; border-color:#000; }' +
          '}' +
          '</style>' +
          '</head><body>' +
          '<div class="badge">' +
          '  <div class="badge-label">VISITOR</div>' +
          '  <div class="badge-name">' + safe + '</div>' +
          '  <div class="badge-sub">Please wear this while on the premises.</div>' +
          '</div>' +
          '</body></html>';

        w.document.open();
        w.document.write(html);
        w.document.close();

        // Try auto-print after a tiny delay
        setTimeout(function(){
          try { w.focus(); w.print(); } catch(_){}
        }, 250);
      }catch(e){
        console.error('[printVisitorBadge]', e);
        alert('Could not open badge window: ' + (e && e.message ? e.message : e));
      }
    }

    // Expose globally
    window.printVisitorBadge = openBadgeWindow;
  })();
</script>

<script id="ernos-visitors-badge-buttons">
  (function(){
    function currentRoute(){
      return (document.body.getAttribute('data-route') || '').toLowerCase();
    }

    function enhanceVisitorsTable(){
      if (currentRoute() !== 'visitors') return;

      var view = document.getElementById('view');
      if (!view) return;

      // First table in the Visitors view
      var table = view.querySelector('table');
      if (!table || table.__ernosBadgeWired) return;
      table.__ernosBadgeWired = true;

      var thead = table.tHead;
      var tbody = table.tBodies && table.tBodies[0];
      if (!thead || !tbody) return;

      var headerRow = thead.rows[0];
      if (!headerRow) return;

      // Do nothing if a "Badge" column already exists
      for (var i = 0; i < headerRow.cells.length; i++){
        var lbl = (headerRow.cells[i].textContent || '').trim().toLowerCase();
        if (lbl === 'badge') return;
      }

      // Find the "Name" or "Visitor" column index to read the visitor name
      var nameIndex = 0;
      for (var j = 0; j < headerRow.cells.length; j++){
        var t = (headerRow.cells[j].textContent || '').trim().toLowerCase();
        if (t.includes('name') || t.includes('visitor')){
          nameIndex = j;
          break;
        }
      }

      // Append header cell
      var th = document.createElement('th');
      th.textContent = 'Badge';
      headerRow.appendChild(th);

      // Append a Badge button cell to each row
      Array.prototype.forEach.call(tbody.rows, function(tr){
        var nameCell = tr.cells[nameIndex];
        var visitorName = nameCell ? (nameCell.textContent || '').trim() : '';

        var td = document.createElement('td');
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'btn small';
        btn.textContent = 'Badge';
        btn.onclick = function(){
          if (window.printVisitorBadge) window.printVisitorBadge(visitorName);
        };
        td.appendChild(btn);
        tr.appendChild(td);
      });
    }

    // Run once DOM is ready
    document.addEventListener('DOMContentLoaded', function(){
      setTimeout(enhanceVisitorsTable, 0);
    });

    // Re-run on hash route changes (#dashboard → #visitors etc.)
    window.addEventListener('hashchange', function(){
      setTimeout(enhanceVisitorsTable, 80);
    });

    // Safety: observe DOM changes in case the SPA re-renders the view
    try{
      var mo = new MutationObserver(function(){
        enhanceVisitorsTable();
      });
      mo.observe(document.body, { childList:true, subtree:true });
    }catch(_){}
  })();
</script>
