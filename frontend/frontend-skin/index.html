<!doctype html>
<html lang="hr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#4E6E81">
  <title>Ernos Zdravstvena Njega</title>
  <link rel="manifest" href="/manifest.webmanifest?v=3">
  <link rel="stylesheet" href="/skin/styles.css?v=15">
  <style>
    :root{--bg:#F4F5F7;--panel:#fff;--text:#2E2E2E;--muted:#606060;--accent:#7BA297;--border:#E1E3E8;--sidebar:#4E6E81;--sidebar-dark:#3E5967;--shadow:0 6px 20px rgba(20,31,50,.06)}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}
    .sidebar{position:fixed;inset:0 auto 0 0;width:270px;background:var(--sidebar);color:#EAF1F4;display:flex;flex-direction:column;gap:12px;padding:16px;z-index:1000;overflow-y:auto}
    .brand{display:flex;align-items:center;justify-content:center;padding:14px 12px;min-height:90px}.brand img{max-width:160px;max-height:90px}.brand-fallback{font-weight:800;text-align:center}
    #nav{display:flex;flex-direction:column;gap:6px} #nav a{display:block;padding:10px 12px;border-radius:10px;color:#EAF1F4;text-decoration:none;font-weight:650;border:1px solid transparent} #nav a.active,#nav a:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.22)}
    .sidebar-footer{margin-top:auto}.main{min-height:100vh;margin-left:270px;display:flex;flex-direction:column}.skin-header{position:sticky;top:0;z-index:900;min-height:58px;display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--sidebar);border-bottom:1px solid var(--sidebar-dark);color:#EAF1F4}.section-name{font-weight:700}#userBadge{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;font-size:.82rem}#userBadge .tag{border:1px solid rgba(255,255,255,.35);border-radius:999px;padding:3px 8px}
    #view{padding:18px}.card{background:var(--panel);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px}.grid{display:grid;gap:12px}.grid.cols-2,.grid.cols-3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}.muted{color:var(--muted)}.table-wrap{overflow:auto}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px 12px;text-align:left}.empty{border:1px dashed var(--border);border-radius:14px;padding:16px;text-align:center;color:var(--muted);background:#fff}.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent);border:0;color:#fff;font-weight:700;border-radius:10px;padding:10px 12px;cursor:pointer;text-decoration:none}.btn.ghost{background:transparent;border:1px solid rgba(255,255,255,.35);color:#fff}.btn.small{padding:6px 10px}input,select,textarea,.input{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font:inherit;background:#fff;color:var(--text)}label{display:block;font-weight:700;margin-bottom:4px}#menuBtn{display:none}
    @media(max-width:900px){.sidebar{width:86vw;max-width:320px;transform:translateX(-100%);transition:transform .2s ease;top:58px;height:calc(100dvh - 58px)}.sidebar.open{transform:none}.main{margin-left:0}.skin-header{position:fixed;left:0;right:0}.main #view{padding-top:76px}#menuBtn{display:inline-flex}body.nav-open{overflow:hidden}}
  </style>
  <script>
    window.ERNOS_PUBLIC_API_URL=window.location.origin;
    window.ERNOS_API=window.location.origin;
    try{localStorage.setItem('ernosApi',window.location.origin.replace(/\/+$/,''));}catch(e){}
  </script>
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="brand"><img src="/skin/icons/logo.png" alt="Ernos Zdravstvena Njega" onerror="this.outerHTML='<div class=&quot;brand-fallback&quot;>Ernos Zdravstvena Njega</div>'"></div>
      <nav id="nav"></nav>
      <div class="sidebar-footer"><button id="logoutBtn" class="btn ghost small" type="button">Odjava</button></div>
    </aside>
    <main class="main">
      <header class="skin-header" id="header"><button id="menuBtn" class="btn ghost small" aria-label="Otvori izbornik" type="button">☰</button><span id="crumbs" class="section-name">Nadzorna ploča</span><div id="userBadge" class="user-info"></div></header>
      <section id="view"></section>
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script src="/app.bundle.js?v=9"></script>
  <script src="/hr-rebrand.js?v=20260702-3"></script>
</body>
</html>
