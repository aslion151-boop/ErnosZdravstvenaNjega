<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Ernos DB Viewer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body { font-family: system-ui, Arial, sans-serif; margin: 20px; }
      header { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
      button { padding: 8px 12px; cursor: pointer; }
      select { padding: 6px; }
      table { border-collapse: collapse; margin-top: 16px; width: 100%; }
      th, td { border: 1px solid #ddd; padding: 8px; }
      th { background: #f5f5f5; text-align: left; }
      .muted { color: #666; }
      #error { color: #b00020; margin-top: 10px; }
      #status { margin-left: auto; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Ernos DB Viewer</h1>
    <header>
      <label for="tables">Tables:</label>
      <select id="tables"></select>
      <button id="load">Load rows</button>
      <span id="status" class="muted">checking…</span>
    </header>

    <div id="error"></div>
    <div id="content" class="muted">Pick a table to view its first 25 rows.</div>

    <script src="app.js"></script>
  </body>
</html>
